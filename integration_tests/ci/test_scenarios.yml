schema_variable_name: "microsoft_ads_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "auto tagging enabled"
    vars:
      microsoft_ads_auto_tagging_enabled: true
      ad_reporting__url_report__using_null_filter: false
      microsoft_ads__using_geographic_daily_report: true
    include_incremental: false